{% extends "base.html" %}
{% block content %}
<div style="max-width:440px;margin:60px auto">
    <div class="glass" style="padding:40px">
        <h1 style="font-size:1.75rem;font-weight:800;text-align:center;margin-bottom:8px">Create Account</h1>
        <p style="text-align:center;color:var(--text-muted);margin-bottom:32px;font-size:0.9rem">Start protecting your data today</p>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" required class="form-input" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" required class="form-input" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" required class="form-input" placeholder="Create a strong password" id="regPass">
                <div id="passStrength" style="height:3px;border-radius:3px;margin-top:6px;transition:all 0.3s"></div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <p style="text-align:center;margin-top:24px;font-size:0.85rem;color:var(--text-muted)">
            Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent-blue);text-decoration:none">Login here</a>
        </p>
    </div>
</div>
<script>
document.getElementById('regPass')?.addEventListener('input', function() {
    const bar = document.getElementById('passStrength');
    const l = this.value.length;
    if (l < 4) { bar.style.width = '25%'; bar.style.background = '#ef4444'; }
    else if (l < 8) { bar.style.width = '50%'; bar.style.background = '#f59e0b'; }
    else if (l < 12) { bar.style.width = '75%'; bar.style.background = '#22d3ee'; }
    else { bar.style.width = '100%'; bar.style.background = '#10b981'; }
});
</script>
{% endblock %}
